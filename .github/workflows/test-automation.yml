name: Cucumber BDD Test Automation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - edge
      environment:
        description: 'Environment to test'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      headless:
        description: 'Run in headless mode'
        required: false
        default: true
        type: boolean
      thread_count:
        description: 'Number of parallel threads'
        required: false
        default: '4'
        type: string

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        browser: [chrome, firefox]
        exclude:
          - os: ubuntu-latest
            browser: edge

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Setup Chrome
      if: matrix.browser == 'chrome'
      uses: browser-actions/setup-chrome@latest

    - name: Setup Firefox
      if: matrix.browser == 'firefox'
      uses: browser-actions/setup-firefox@latest

    - name: Setup Edge
      if: matrix.browser == 'edge' && matrix.os == 'windows-latest'
      uses: browser-actions/setup-edge@latest

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Clean Maven
      run: mvn clean

    - name: Compile project
      run: mvn compile

    - name: Validate email notification config
      shell: pwsh
      env:
        REPORT_EMAIL_ENABLED: ${{ secrets.REPORT_EMAIL_ENABLED }}
        EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}
      run: |
        if ($env:REPORT_EMAIL_ENABLED -ne "true") {
          Write-Host "Email notification disabled. Set REPORT_EMAIL_ENABLED=true to send email."
          exit 0
        }

        $missing = @()
        foreach ($name in @("EMAIL_FROM", "EMAIL_PASSWORD", "EMAIL_TO")) {
          if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
            $missing += $name
          }
        }

        if ($missing.Count -gt 0) {
          throw "Email notification enabled but missing secrets: $($missing -join ', ')"
        }

        Write-Host "Email notification config valid."

    - name: Run tests
      shell: pwsh
      env:
        REPORT_EMAIL_ENABLED: 'false'
        REPORT_EXTENT_ENABLED: 'true'
        ALLURE_REPORT_URL: ${{ secrets.ALLURE_REPORT_URL || format('https://{0}.github.io/{1}/{2}/', github.repository_owner, github.event.repository.name, github.run_number) }}
        EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST || 'smtp.gmail.com' }}
        EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT || '587' }}
        EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}
      run: |
        New-Item -ItemType Directory -Force -Path target | Out-Null
        mvn test "-P${{ github.event.inputs.environment || 'dev' }}" `
          "-Dbrowser=${{ github.event.inputs.browser || matrix.browser }}" `
          "-Dheadless=${{ github.event.inputs.headless || 'true' }}" `
          "-Dthread.count=${{ github.event.inputs.thread_count || '4' }}" 2>&1 |
          Tee-Object -FilePath target/email-report-run.log
        exit $LASTEXITCODE
      continue-on-error: true

    - name: Upload Email Report Execution Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: email-report-log-${{ matrix.os }}-${{ matrix.browser }}
        path: target/email-report-run.log
        retention-days: 7

    - name: Upload Surefire Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-reports-${{ matrix.os }}-${{ matrix.browser }}
        path: target/surefire-reports/
        retention-days: 7

    - name: Prepare Allure Results
      if: always()
      shell: pwsh
      run: ./scripts/allure/Prepare-AllureResults.ps1

    - name: Generate Allure Report
      if: always()
      run: mvn allure:report

    - name: Upload Allure Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ matrix.os }}-${{ matrix.browser }}
        path: exports/AllureReport/
        retention-days: 30

    - name: Upload Extent Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: extent-report-${{ matrix.os }}-${{ matrix.browser }}
        path: exports/ExtentReport/
        retention-days: 30

    - name: Upload Screenshots
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots-${{ matrix.os }}-${{ matrix.browser }}
        path: exports/screenshots/
        retention-days: 7

    - name: Upload Test Videos
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: videos-${{ matrix.os }}-${{ matrix.browser }}
        path: exports/videos/
        retention-days: 7

    - name: Publish Test Results
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: |
          target/surefire-reports/*.xml

  publish-report:
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Allure Results
      uses: actions/download-artifact@v4
      with:
        pattern: allure-results-*
        path: allure-results
        merge-multiple: true

    - name: Get Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Add Allure categories
      if: always()
      shell: pwsh
      run: ./scripts/allure/Merge-AllureCategories.ps1 -ResultsDirectory allure-results

    - name: Allure Report action
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_reports: 20

    - name: Deploy Allure report to Github Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history

    - name: Upload Published Allure HTML
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: published-allure-html
        path: allure-history/
        retention-days: 7

  notify:
    needs: [test, publish-report]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Download Surefire Reports
      if: always()
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        pattern: surefire-reports-*
        path: surefire-reports

    - name: Download Published Allure HTML
      if: always()
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        name: published-allure-html
        path: published-allure-html

    - name: Download Extent Reports
      if: always()
      continue-on-error: true
      uses: actions/download-artifact@v4
      with:
        pattern: extent-report-*
        path: extent-reports

    - name: Validate email dry-run
      if: always()
      env:
        REPORT_EMAIL_ENABLED: ${{ secrets.REPORT_EMAIL_ENABLED }}
        EMAIL_DRY_RUN: 'true'
        EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST || 'smtp.gmail.com' }}
        EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT || '587' }}
        EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}
        SUREFIRE_REPORTS_DIR: surefire-reports
        ALLURE_HTML_DIR: published-allure-html
        EXTENT_REPORTS_DIR: extent-reports
        EMAIL_ATTACH_ALLURE_HTML: ${{ secrets.EMAIL_ATTACH_ALLURE_HTML || 'true' }}
        EMAIL_ATTACH_EXTENT_REPORT: ${{ secrets.EMAIL_ATTACH_EXTENT_REPORT || 'true' }}
        EMAIL_MAX_ATTACHMENT_MB: ${{ secrets.EMAIL_MAX_ATTACHMENT_MB || '20' }}
        CI_TEST_STATUS: test=${{ needs.test.result }}, publish-report=${{ needs.publish-report.result }}
        ALLURE_REPORT_URL: ${{ secrets.ALLURE_REPORT_URL || format('https://{0}.github.io/{1}/{2}/', github.repository_owner, github.event.repository.name, github.run_number) }}
        GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        if [ "$REPORT_EMAIL_ENABLED" != "true" ]; then
          echo "Email notification disabled. Dry-run skipped."
          exit 0
        fi
        mvn -q -DskipTests compile exec:java -Dexec.mainClass=mail.CiEmailReportSender

    - name: Send final email report
      if: always()
      env:
        REPORT_EMAIL_ENABLED: ${{ secrets.REPORT_EMAIL_ENABLED }}
        EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST || 'smtp.gmail.com' }}
        EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT || '587' }}
        EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}
        SUREFIRE_REPORTS_DIR: surefire-reports
        ALLURE_HTML_DIR: published-allure-html
        EXTENT_REPORTS_DIR: extent-reports
        EMAIL_ATTACH_ALLURE_HTML: ${{ secrets.EMAIL_ATTACH_ALLURE_HTML || 'true' }}
        EMAIL_ATTACH_EXTENT_REPORT: ${{ secrets.EMAIL_ATTACH_EXTENT_REPORT || 'true' }}
        EMAIL_MAX_ATTACHMENT_MB: ${{ secrets.EMAIL_MAX_ATTACHMENT_MB || '20' }}
        CI_TEST_STATUS: test=${{ needs.test.result }}, publish-report=${{ needs.publish-report.result }}
        ALLURE_REPORT_URL: ${{ secrets.ALLURE_REPORT_URL || format('https://{0}.github.io/{1}/{2}/', github.repository_owner, github.event.repository.name, github.run_number) }}
        GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        if [ "$REPORT_EMAIL_ENABLED" != "true" ]; then
          echo "Email notification disabled. Send skipped."
          exit 0
        fi
        mvn -q -DskipTests compile exec:java -Dexec.mainClass=mail.CiEmailReportSender

    - name: Send notification
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        text: |
          Test Execution Completed
          Environment: ${{ github.event.inputs.environment || 'dev' }}
          Browser: ${{ github.event.inputs.browser || 'chrome' }}
          Result: ${{ job.status }}
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
